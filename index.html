<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Rogue Demo</title>
  <style>
    /* Минимальные стили для поля. */
    .field {
      position: relative;
      width: 640px; /* При изменении ШхВ, учитывать размеры в script.js в строках MAP_WIDTH+MAP_HEIGHT*/
      height: 384px;
      background-color: #333;
      margin: 0 auto;
      outline: 2px solid #000;
    }
    .tile {
      position: absolute;
      box-sizing: border-box;
      width: 16px;
      height: 16px;
      font-size: 10px;
      text-align: center;
      line-height: 16px;
      color: #fff;
    }
    /* Стили для вариантов тайлов (можно усложнить) */
    .wall {
        background-image: url('img/wall.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }
    .floor {
      background-color: #222;
    }
    .potion {
      background-image: url('img/potion.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;

    }
    .sword {
        background-image: url('img/sword.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }
    .enemy {
        background-image: url('img/enemy.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }
    .hero {
        background-image: url('img/hero.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }
    /* Пример отображения шкалы здоровья */
    /* .health-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background-color: red;
    } */
    /* Стили для панели здоровья под полем */
    .hero-stats {
        width: 640px;
        margin: 20px auto;
        padding: 10px;
        background-color: #333;
        border: 2px solid #000;
    }

    .health-bar-container {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .health-bar-label {
        color: white;
        min-width: 120px;
    }

    .health-bar-outer {
        flex-grow: 1;
        height: 20px;
        background-color: #555;
        border: 1px solid #000;
    }

    .health-bar-inner {
        height: 100%;
        background-color: #ff3333;
        transition: width 0.3s ease;
    }

    .health-value {
        color: white;
        min-width: 80px;
        text-align: right;
    }

    /* Стили для панели здоровья врага */
    .nearest-enemy-stats {
        width: 640px;
        margin: 10px auto;
        padding: 10px;
        background-color: #333;
        border: 2px solid #000;
    }

    .nearest-enemy-stats .health-bar-inner {
        background-color: #B22222;  /* Красный цвет для врага */
    }

    .distance-value {
        color: #aaa;
        margin-left: 10px;
        font-size: 0.9em;
    }
  </style>
</head>
<body>

  <h1 style="text-align: center;">Rogue Demo</h1>
  <p style="text-align: center;">Чтобы управлять персонажем, используйте клавиши: W, A, S, D, чтобы бить врагов используйте пробел</p>
  <div class="field"></div>
  <div class="hero-stats">
    <div class="health-bar-container">
        <div class="health-bar-label">Здоровье героя:</div>
        <div class="health-bar-outer">
            <div class="health-bar-inner"></div>
        </div>
        <div class="health-value">100/100</div>
    </div>
  </div>
  <div class="nearest-enemy-stats">
    <div class="health-bar-container">
        <div class="health-bar-label">Ближайший враг:</div>
        <div class="health-bar-outer">
            <div class="health-bar-inner"></div>
        </div>
        <div class="health-value">30/30</div>
        <div class="distance-value">(расстояние: 0)</div>
    </div>
  </div>

  <!-- Добавляем аудио элементы -->
  <audio id="potion-sound" src="sounds/potion.mp3" preload="auto"></audio>
  <audio id="attack-sound" src="sounds/attack.mp3" preload="auto"></audio>
  <audio id="death-sound" src="sounds/death.mp3" preload="auto"></audio>
  <audio id="pain-sound" src="sounds/pain.mp3" preload="auto"></audio>

  <script src="js/jquery.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
