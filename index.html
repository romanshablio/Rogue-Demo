<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Rogue Demo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <script src="js/jquery.min.js"></script>
  <style>
    /* Минимальные стили для поля. */
    
   
  </style>
</head>
<body>
  <div class="mobile-controls">
    <div class="d-pad">
        <div class="d-pad-button d-pad-up">↑</div>
        <div class="d-pad-button d-pad-right">→</div>
        <div class="d-pad-button d-pad-down">↓</div>
        <div class="d-pad-button d-pad-left">←</div>
    </div>
    <div class="attack-button">АТАКА</div>
  </div>

  <h1 style="text-align: center;">Rogue Demo</h1>
  <p style="text-align: center;">Чтобы управлять персонажем, используйте клавиши: W, A, S, D. Чтобы атаковать врагов или взаимодействовать с принцессой, используйте пробел. Победите всех врагов, найдите принцессу и отведите ее к двери!</p>
  <button class="fog-toggle">Туман войны: Вкл</button>
  <div class="hero-health-corner">
    <div class="health-bar-container">
      <div class="health-bar-outer">
        <div class="health-bar-inner"></div>
      </div>
      <div class="health-value">100/100</div>
    </div>
  </div>
  <div class="field"></div>

  <!-- Добавляем аудио элементы -->
  <audio id="potion-sound" src="sounds/potion.mp3" preload="auto"></audio>
  <audio id="attack-sound" src="sounds/attack.mp3" preload="auto"></audio>
  <audio id="death-sound" src="sounds/death.mp3" preload="auto"></audio>
  <audio id="pain-sound" src="sounds/pain.mp3" preload="auto"></audio>

  <script src="js/script.js"></script>
  <script src="js/mobile-controls.js"></script>
</body>
</html>
